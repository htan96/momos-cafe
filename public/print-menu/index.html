<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Momo's Café — Print Menu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,400;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/print-menu/menu.css">
  </head>
  <body>
    <div class="toolbar no-print" aria-label="Menu controls">
      <button type="button" id="btn-print" class="toolbar__btn toolbar__btn--primary">
        Print Menu
      </button>
      <span class="toolbar__hint"
        >Default: <code>/api/menu</code> → Square layout · <code>?source=simple</code> JSON ·
        <code>?source=square</code> demo · <code>?legacy=1</code> static</span
      >
      <label class="toolbar__label">
        Load simple JSON
        <input type="file" id="input-json" accept="application/json,.json" />
      </label>
      <button type="button" id="btn-reset" class="toolbar__btn toolbar__btn--ghost">
        Reload defaults
      </button>
    </div>

    <main id="menu-root" class="menu-root"></main>

    <script src="/print-menu/square-map.js"></script>
    <script src="/print-menu/menu.js" defer></script>
  </body>
</html>
